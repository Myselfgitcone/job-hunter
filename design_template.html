  <style>/* ============================================================
   JOB HUNTER — Design System
   Dark, glassy (35%), violet→cyan. Power-user density.
   ============================================================ */

:root {
  /* — Surfaces — */
  --bg-base:      #0a0b10;
  --bg-base-2:    #0c0e14;
  --bg-surface:   #101218;
  --bg-elevated:  #161922;
  --bg-hover:     #1a1e29;
  --bg-active:    #1f2430;

  /* glass */
  --glass:        rgba(22, 25, 34, 0.62);
  --glass-hi:     rgba(28, 32, 44, 0.72);
  --glass-border: rgba(255, 255, 255, 0.07);
  --glass-blur:   14px;

  /* — Borders / lines — */
  --line:         rgba(255, 255, 255, 0.06);
  --line-hi:      rgba(255, 255, 255, 0.11);
  --line-soft:    rgba(255, 255, 255, 0.04);

  /* — Text — */
  --tx:           #e9ebf1;
  --tx-2:         #9aa1b2;
  --tx-3:         #646b7d;
  --tx-faint:     #454b59;

  /* — Accents — */
  --violet:       #8b5cf6;
  --violet-deep:  #7c3aed;
  --violet-glow:  rgba(124, 58, 237, 0.45);
  --cyan:         #22d3ee;
  --cyan-deep:    #06b6d4;
  --amber:        #f59e0b;
  --grad: linear-gradient(120deg, #7c3aed 0%, #06b6d4 100%);
  --grad-soft: linear-gradient(120deg, rgba(124,58,237,0.18), rgba(6,182,212,0.14));

  /* — Status — */
  --st-new:       #3b82f6;
  --st-applied:   #10b981;
  --st-interview: #f59e0b;
  --st-skipped:   #5d6370;

  /* — Source brand dots — */
  --src-greenhouse: #2bb673;
  --src-lever:      #6d5ae6;
  --src-ashby:      #e8654a;
  --src-workday:    #f0a73f;
  --src-hiringcafe: #ec4899;

  /* — Radii — */
  --r-sm: 6px;
  --r:    9px;
  --r-lg: 13px;
  --r-xl: 18px;

  /* — Shadow — */
  --sh-1: 0 1px 2px rgba(0,0,0,.4);
  --sh-2: 0 6px 24px -6px rgba(0,0,0,.6);
  --sh-pop: 0 18px 50px -12px rgba(0,0,0,.7), 0 0 0 1px var(--glass-border);
  --sh-glow: 0 0 0 1px rgba(124,58,237,.4), 0 8px 30px -6px var(--violet-glow);

  --sidebar-w: 212px;
  --ease: cubic-bezier(.22,.61,.36,1);
  --ease-spring: cubic-bezier(.34,1.56,.64,1);

  /* — Type — */
  --f-ui: "Inter", system-ui, sans-serif;
  --f-display: "Sora", "Inter", sans-serif;
  --f-mono: "JetBrains Mono", ui-monospace, monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg-base);
  color: var(--tx);
  font-family: var(--f-ui);
  font-size: 13px;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  letter-spacing: -0.01em;
  overflow: hidden;
}

::selection { background: rgba(124,58,237,.4); color: #fff; }

button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input { font-family: inherit; }

/* atmospheric background mesh — subtle, doesn't move while scanning */
body::before {
  content: "";
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(680px 480px at 16% -8%, rgba(124,58,237,0.14), transparent 60%),
    radial-gradient(720px 520px at 92% 8%, rgba(6,182,212,0.10), transparent 62%),
    radial-gradient(900px 700px at 60% 120%, rgba(124,58,237,0.06), transparent 60%);
}

#root { position: relative; z-index: 1; height: 100vh; }

/* ============ scrollbars ============ */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,.08); border-radius: 10px; border: 3px solid transparent; background-clip: padding-box; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,.16); background-clip: padding-box; }
::-webkit-scrollbar-track { background: transparent; }

/* ============================================================
   APP SHELL
   ============================================================ */
.app { display: flex; height: 100vh; }

/* ---------------- SIDEBAR ---------------- */
.sidebar {
  width: var(--sidebar-w);
  flex: 0 0 var(--sidebar-w);
  background: linear-gradient(180deg, rgba(16,18,24,.9), rgba(10,11,16,.92));
  border-right: 1px solid var(--line);
  display: flex; flex-direction: column;
  padding: 14px 10px 10px;
  backdrop-filter: blur(var(--glass-blur));
}
.brand {
  display: flex; align-items: center; gap: 9px;
  padding: 4px 8px 14px;
}
.brand-mark {
  width: 26px; height: 26px; border-radius: 50%;
  border: 2.5px solid #2563eb; background: transparent;
  display: grid; place-items: center;
  box-shadow: none;
  position: relative;
}
.brand-mark svg { width: 15px; height: 15px; color: #fff; }
.brand-dot { width: 9px; height: 9px; border-radius: 50%; background: #2563eb; }
.brand-text { display: flex; flex-direction: column; gap: 1px; min-width: 0; }
.brand-name { font-family: var(--f-display); font-weight: 700; font-size: 15px; letter-spacing: -.02em; line-height: 1.1; }
.brand-name .hl { color: #3b82f6; }
.brand-sub { font-size: 9.5px; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; color: var(--tx-3); line-height: 1.1; white-space: nowrap; }
.brand-name .dot { color: var(--cyan); }

.nav-group { display: flex; flex-direction: column; gap: 1px; margin-top: 2px; }
.nav-label {
  font-size: 10.5px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase;
  color: var(--tx-faint); padding: 12px 10px 5px;
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 10px; border-radius: var(--r-sm);
  color: var(--tx-2); font-size: 13px; font-weight: 500;
  position: relative; transition: background .14s var(--ease), color .14s var(--ease);
}
.nav-item svg { width: 16px; height: 16px; flex: 0 0 16px; opacity: .9; }
.nav-item:hover { background: var(--bg-hover); color: var(--tx); }
.nav-item.active { background: var(--bg-active); color: var(--tx); }
.nav-item.active::before {
  content: ""; position: absolute; left: -10px; top: 50%; transform: translateY(-50%);
  width: 3px; height: 17px; border-radius: 0 3px 3px 0; background: var(--grad);
  box-shadow: 0 0 10px var(--violet-glow);
}
.nav-item .kbd { margin-left: auto; }
.nav-count {
  margin-left: auto; font-family: var(--f-mono); font-size: 10.5px;
  color: var(--tx-3); background: var(--bg-elevated); padding: 1px 6px; border-radius: 20px;
}

.sidebar-spacer { flex: 1; }

.cmd-hint {
  display: flex; align-items: center; gap: 8px; justify-content: center;
  margin: 6px 4px; padding: 7px; border-radius: var(--r-sm);
  border: 1px dashed var(--line-hi); color: var(--tx-3); font-size: 11.5px;
  transition: border-color .15s, color .15s;
}
.cmd-hint:hover { border-color: var(--violet); color: var(--tx-2); }

.user-card {
  display: flex; align-items: center; gap: 9px;
  padding: 8px; border-radius: var(--r);
  border: 1px solid var(--line); background: var(--glass);
}
.user-av {
  width: 30px; height: 30px; border-radius: 8px; flex: 0 0 30px;
  background: conic-gradient(from 140deg, #7c3aed, #06b6d4, #f59e0b, #7c3aed);
  display: grid; place-items: center; font-weight: 700; font-size: 12px; color: #fff;
  font-family: var(--f-display);
}
.user-meta { min-width: 0; }
.user-name { font-size: 12.5px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.user-mail { font-size: 11px; color: var(--tx-3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.user-logout { margin-left: auto; color: var(--tx-3); padding: 4px; border-radius: 5px; flex: 0 0 auto; }
.user-logout:hover { color: var(--st-interview); background: var(--bg-hover); }
.user-logout svg { width: 15px; height: 15px; display: block; }

/* ---------------- MAIN ---------------- */
.main { flex: 1; min-width: 0; display: flex; flex-direction: column; }

/* keyboard key pill */
.kbd {
  font-family: var(--f-mono); font-size: 10px; line-height: 1;
  padding: 3px 5px; border-radius: 5px; color: var(--tx-2);
  background: var(--bg-elevated); border: 1px solid var(--line-hi);
  box-shadow: 0 1px 0 rgba(0,0,0,.4); min-width: 16px; text-align: center;
}

/* ============================================================
   TOP BAR
   ============================================================ */
.topbar {
  display: flex; align-items: center; gap: 14px;
  padding: 12px 18px; border-bottom: 1px solid var(--line);
  background: linear-gradient(180deg, rgba(12,14,20,.7), rgba(12,14,20,.4));
  backdrop-filter: blur(var(--glass-blur));
}

.scrape-btn {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--grad); color: #fff; font-weight: 600; font-size: 12.5px;
  padding: 8px 14px; border-radius: var(--r);
  box-shadow: 0 6px 18px -6px var(--violet-glow), inset 0 1px 0 rgba(255,255,255,.22);
  transition: transform .15s var(--ease-spring), box-shadow .2s, filter .2s;
  position: relative; overflow: hidden;
}
.scrape-btn:hover { transform: translateY(-1px); filter: brightness(1.08); box-shadow: 0 10px 26px -8px var(--violet-glow), inset 0 1px 0 rgba(255,255,255,.28); }
.scrape-btn:active { transform: translateY(0) scale(.98); }
.scrape-btn svg { width: 15px; height: 15px; }
.scrape-btn.running { pointer-events: none; animation: pulseBtn 1.4s ease-in-out infinite; }
.scrape-btn.running svg { animation: spin .9s linear infinite; }
@keyframes pulseBtn {
  0%,100% { box-shadow: 0 6px 18px -6px var(--violet-glow), inset 0 1px 0 rgba(255,255,255,.22); }
  50% { box-shadow: 0 6px 30px -2px var(--violet-glow), 0 0 0 4px rgba(124,58,237,.16), inset 0 1px 0 rgba(255,255,255,.22); }
}
@keyframes spin { to { transform: rotate(360deg); } }

.meta { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--tx-3); }
.meta .dot-sep { width: 3px; height: 3px; border-radius: 50%; background: var(--tx-faint); }
.meta b { font-family: var(--f-mono); color: var(--tx-2); font-weight: 500; }
.live-pip { width: 7px; height: 7px; border-radius: 50%; background: var(--st-applied); box-shadow: 0 0 0 0 rgba(16,185,129,.5); animation: pip 2s ease-out infinite; }
@keyframes pip { 0% { box-shadow: 0 0 0 0 rgba(16,185,129,.5);} 70%{ box-shadow: 0 0 0 6px rgba(16,185,129,0);} 100%{box-shadow:0 0 0 0 rgba(16,185,129,0);} }

.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
.job-count { font-family: var(--f-mono); font-size: 12px; color: var(--tx-2); }
.job-count b { color: var(--tx); font-weight: 600; }

.seg {
  display: flex; background: var(--bg-elevated); border: 1px solid var(--line); border-radius: var(--r-sm); padding: 2px;
}
.seg button {
  display: grid; place-items: center; width: 30px; height: 26px; border-radius: 5px; color: var(--tx-3);
  transition: background .14s, color .14s;
}
.seg button svg { width: 15px; height: 15px; }
.seg button:hover { color: var(--tx-2); }
.seg button.on { background: var(--bg-active); color: var(--tx); box-shadow: var(--sh-1); }

/* ============================================================
   FILTER BAR
   ============================================================ */
.filterbar {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  padding: 10px 18px; border-bottom: 1px solid var(--line);
  background: rgba(10,11,16,.4);
}
.chip {
  display: inline-flex; align-items: center; gap: 6px;
  height: 30px; padding: 0 11px; border-radius: 8px; font-size: 12px; font-weight: 500;
  color: var(--tx-2); background: var(--bg-elevated); border: 1px solid var(--line);
  transition: all .14s var(--ease); white-space: nowrap;
}
.chip:hover { border-color: var(--line-hi); color: var(--tx); background: var(--bg-hover); }
.chip svg { width: 14px; height: 14px; opacity: .85; }
.chip .caret { width: 12px; height: 12px; opacity: .5; margin-left: 1px; }
.chip.on { color: var(--tx); border-color: transparent; background: var(--grad-soft); box-shadow: inset 0 0 0 1px rgba(124,58,237,.4); }
.chip.role { color: var(--tx); border-color: rgba(124,58,237,.5); background: rgba(124,58,237,.13); }
.chip.role .target { color: var(--violet); }
.chip.active-val { color: var(--tx); border-color: var(--line-hi); }
.chip.active-val .val { color: var(--cyan); font-weight: 600; }

.search-wrap { position: relative; display: flex; align-items: center; flex: 1; min-width: 180px; max-width: 320px; }
.search-wrap svg.s-ico { position: absolute; left: 10px; width: 15px; height: 15px; color: var(--tx-3); pointer-events: none; }
.search-input {
  width: 100%; height: 32px; padding: 0 30px 0 32px; border-radius: 8px;
  background: var(--bg-elevated); border: 1px solid var(--line); color: var(--tx); font-size: 12.5px;
  transition: border-color .15s, box-shadow .15s;
}
.search-input::placeholder { color: var(--tx-faint); }
.search-input:focus { outline: none; border-color: rgba(124,58,237,.55); box-shadow: 0 0 0 3px rgba(124,58,237,.13); }
.search-wrap .s-kbd { position: absolute; right: 8px; }

.fb-divider { width: 1px; height: 20px; background: var(--line); margin: 0 2px; }

.segchips { display: inline-flex; background: var(--bg-elevated); border: 1px solid var(--line); border-radius: 8px; padding: 2px; gap: 1px; }
.segchips button {
  font-family: var(--f-mono); font-size: 11px; font-weight: 500; color: var(--tx-3);
  height: 24px; padding: 0 8px; border-radius: 6px; transition: all .13s;
}
.segchips button:hover { color: var(--tx-2); }
.segchips button.on { color: var(--tx); background: var(--bg-active); box-shadow: var(--sh-1); }
.segchips.score button.on { color: #fff; background: var(--grad); }

.clear-btn {
  display: inline-flex; align-items: center; gap: 6px; height: 30px; padding: 0 10px; border-radius: 8px;
  color: #f87171; background: rgba(248,113,113,.08); border: 1px solid rgba(248,113,113,.22); font-size: 12px; font-weight: 500;
  transition: background .14s;
}
.clear-btn:hover { background: rgba(248,113,113,.15); }
.clear-btn .n { font-family: var(--f-mono); background: rgba(248,113,113,.2); border-radius: 10px; padding: 0 5px; font-size: 10.5px; }

/* ============ NEW: consolidated Filters button + panel ============ */
.filters-btn {
  display: inline-flex; align-items: center; gap: 7px; height: 32px; padding: 0 11px; border-radius: 8px;
  font-size: 12.5px; font-weight: 500; color: var(--tx-2); background: var(--bg-elevated); border: 1px solid var(--line);
  transition: all .14s var(--ease); white-space: nowrap;
}
.filters-btn:hover { border-color: var(--line-hi); color: var(--tx); background: var(--bg-hover); }
.filters-btn svg { width: 14px; height: 14px; opacity: .9; }
.filters-btn .caret { width: 12px; height: 12px; opacity: .5; }
.filters-btn.has { color: var(--tx); border-color: transparent; background: var(--grad-soft); box-shadow: inset 0 0 0 1px rgba(124,58,237,.4); }
.fb-count {
  font-family: var(--f-mono); font-size: 10.5px; font-weight: 700; line-height: 1;
  min-width: 17px; height: 17px; padding: 0 4px; border-radius: 9px; display: inline-grid; place-items: center;
  color: #fff; background: var(--grad); box-shadow: 0 0 10px -2px var(--violet-glow);
}

.fb-time-label { font-size: 11px; color: var(--tx-3); margin-left: 2px; }

.filter-panel {
  position: absolute; z-index: 70; top: calc(100% + 8px); left: 0; width: 540px; max-width: 86vw;
  background: var(--glass-hi); backdrop-filter: blur(22px); border: 1px solid var(--glass-border);
  border-radius: var(--r-xl); box-shadow: var(--sh-pop); animation: popIn .17s var(--ease); overflow: hidden;
}
.fp-head { display: flex; align-items: center; justify-content: space-between; padding: 15px 18px; border-bottom: 1px solid var(--line); }
.fp-title { font-family: var(--f-display); font-size: 14px; font-weight: 600; letter-spacing: -.01em; }
.fp-reset {
  font-size: 12px; font-weight: 500; color: var(--tx-3); padding: 4px 8px; border-radius: 6px; transition: color .14s, background .14s;
}
.fp-reset:hover { color: #f87171; background: rgba(248,113,113,.08); }

.fp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 26px; padding: 16px 18px; }
.fp-group { padding: 6px 0; }
.fp-group.span { grid-column: 1 / -1; }
.fp-group-label { font-size: 10.5px; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; color: var(--tx-faint); margin-bottom: 9px; }
.fp-opts { display: flex; flex-direction: column; gap: 2px; }
.fp-group.span .fp-opts { flex-direction: row; flex-wrap: wrap; gap: 7px; }

.fp-check, .fp-radio {
  display: flex; align-items: center; gap: 9px; padding: 6px 8px; border-radius: 7px; cursor: pointer;
  font-size: 12.5px; color: var(--tx-2); transition: background .12s, color .12s; user-select: none;
}
.fp-check:hover, .fp-radio:hover { background: var(--bg-hover); color: var(--tx); }
.fp-check.on, .fp-radio.on { color: var(--tx); }

.fp-box {
  width: 17px; height: 17px; flex: 0 0 17px; border-radius: 5px; border: 1.5px solid var(--line-hi);
  display: grid; place-items: center; transition: all .14s var(--ease); background: var(--bg-base-2);
}
.fp-box svg { width: 12px; height: 12px; color: #fff; opacity: 0; transform: scale(.6); transition: all .14s var(--ease-spring); }
.fp-check.on .fp-box { background: var(--grad); border-color: transparent; box-shadow: 0 0 10px -2px var(--violet-glow); }
.fp-check.on .fp-box svg { opacity: 1; transform: scale(1); }

/* score radio as segmented pills */
.fp-group.span .fp-radio {
  padding: 5px 12px; border-radius: 8px; background: var(--bg-elevated); border: 1px solid var(--line);
  font-family: var(--f-mono); font-size: 11.5px; font-weight: 500;
}
.fp-group.span .fp-radio.on { color: #fff; background: var(--grad); border-color: transparent; box-shadow: 0 0 12px -3px var(--violet-glow); }
.fp-group.span .fp-radio .fp-dot { display: none; }

.fp-foot { display: flex; align-items: center; gap: 12px; padding: 13px 18px; border-top: 1px solid var(--line); background: rgba(0,0,0,.12); }
.fp-summary { font-size: 12px; color: var(--tx-3); }
.fp-summary b { font-family: var(--f-mono); color: var(--tx-2); font-weight: 600; }
.fp-apply {
  margin-left: auto; display: inline-flex; align-items: center; gap: 7px; height: 34px; padding: 0 16px; border-radius: 8px;
  font-size: 12.5px; font-weight: 600; color: #fff; background: var(--grad); border: 1px solid transparent;
  box-shadow: 0 5px 16px -6px var(--violet-glow), inset 0 1px 0 rgba(255,255,255,.2); transition: filter .15s, transform .15s var(--ease-spring);
}
.fp-apply:hover { filter: brightness(1.08); transform: translateY(-1px); }
.fp-apply svg { width: 14px; height: 14px; }

/* dropdown menu */
.menu {
  position: absolute; z-index: 60; top: calc(100% + 6px); left: 0; min-width: 160px;
  background: var(--glass-hi); backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border); border-radius: var(--r-lg); padding: 5px;
  box-shadow: var(--sh-pop); animation: popIn .16s var(--ease);
}
@keyframes popIn { from { opacity: 0; transform: translateY(-6px) scale(.98);} to {opacity:1; transform: none;} }
.menu-item {
  display: flex; align-items: center; gap: 9px; padding: 7px 9px; border-radius: 7px;
  font-size: 12.5px; color: var(--tx-2); transition: background .12s, color .12s;
}
.menu-item:hover { background: var(--bg-hover); color: var(--tx); }
.menu-item.sel { color: var(--tx); }
.menu-item .check { margin-left: auto; color: var(--cyan); width: 14px; height: 14px; opacity: 0; }
.menu-item.sel .check { opacity: 1; }
.menu-item .swatch { width: 8px; height: 8px; border-radius: 50%; }

/* ============================================================
   JOBS LAYOUT (list | detail)
   ============================================================ */
.jobs-body { flex: 1; display: flex; min-height: 0; min-width: 0; overflow: hidden; }
.list-pane {
  width: 38%; min-width: 340px; max-width: 480px;
  border-right: 1px solid var(--line); display: flex; flex-direction: column;
  background: rgba(10,11,16,.25); overflow: hidden;
}
.list-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 14px; font-size: 11px; color: var(--tx-3); border-bottom: 1px solid var(--line-soft);
}
.list-head .sort { display: inline-flex; align-items: center; gap: 5px; cursor: pointer; }
.list-head .sort:hover { color: var(--tx-2); }
.list-scroll { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 6px; }

/* ---- JobCard: COMPACT row mode ---- */
.jobcard {
  position: relative; display: flex; align-items: center; gap: 10px;
  padding: 8px 10px 8px 12px; border-radius: var(--r); cursor: pointer;
  border: 1px solid transparent; transition: background .13s var(--ease), border-color .13s, transform .13s;
}
.jobcard::before {
  content: ""; position: absolute; left: 4px; top: 9px; bottom: 9px; width: 2.5px; border-radius: 3px;
  background: var(--st-color, transparent); opacity: .85; transition: opacity .15s;
}
.jobcard:hover { background: var(--bg-hover); }
.jobcard.sel { background: var(--bg-active); border-color: var(--line-hi); box-shadow: var(--sh-1); }
.jobcard.sel::before { opacity: 1; box-shadow: 0 0 8px var(--st-color); }

.logo {
  width: 34px; height: 34px; flex: 0 0 34px; border-radius: 9px; display: grid; place-items: center;
  font-family: var(--f-display); font-weight: 700; font-size: 13px; color: #fff;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.15), var(--sh-1); position: relative;
}
.jc-main { min-width: 0; flex: 1; display: flex; flex-direction: column; gap: 2px; }
.jc-title-row { display: flex; align-items: center; gap: 7px; }
.jc-title { font-size: 13px; font-weight: 600; color: var(--tx); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: -.01em; }
.jc-sub { display: flex; align-items: center; gap: 6px; font-size: 11.5px; color: var(--tx-3); min-width: 0; }
.jc-sub .co { color: var(--tx-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 130px; }
.jc-sub .sep { width: 2.5px; height: 2.5px; border-radius: 50%; background: var(--tx-faint); flex: 0 0 auto; }
.jc-sub .loc { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.jc-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex: 0 0 auto; }
.jc-time { font-family: var(--f-mono); font-size: 10.5px; color: var(--tx-3); }

.badge-remote { font-size: 10px; font-weight: 600; color: var(--cyan); background: rgba(34,211,238,.1); border: 1px solid rgba(34,211,238,.22); padding: 1px 5px; border-radius: 5px; letter-spacing: .02em; }
.badge-new {
  font-family: var(--f-mono); font-size: 9.5px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase;
  color: var(--amber); background: rgba(245,158,11,.12); border: 1px solid rgba(245,158,11,.3); padding: 1px 5px; border-radius: 5px;
}
.badge-src { display: inline-flex; align-items: center; gap: 4px; font-size: 10.5px; color: var(--tx-3); }
.badge-src .sw { width: 6px; height: 6px; border-radius: 50%; }

/* mini score badge */
.score-badge {
  font-family: var(--f-mono); font-size: 11px; font-weight: 700; padding: 2px 6px; border-radius: 6px;
  display: inline-flex; align-items: center; gap: 3px; letter-spacing: -.02em;
}
.score-badge.low  { color: var(--tx-2); background: var(--bg-elevated); border: 1px solid var(--line-hi); }
.score-badge.mid  { color: var(--cyan); background: rgba(34,211,238,.1); border: 1px solid rgba(34,211,238,.25); }
.score-badge.high { color: #c4b5fd; background: rgba(124,58,237,.16); border: 1px solid rgba(124,58,237,.45); box-shadow: 0 0 14px -2px var(--violet-glow); }

.skip-quick {
  position: absolute; right: 8px; top: 50%; transform: translateY(-50%) scale(.85);
  width: 24px; height: 24px; border-radius: 6px; display: grid; place-items: center;
  background: var(--bg-elevated); border: 1px solid var(--line-hi); color: var(--tx-3);
  opacity: 0; transition: opacity .13s, transform .13s, color .13s; pointer-events: none;
}
.jobcard:hover .skip-quick { opacity: 1; transform: translateY(-50%) scale(1); pointer-events: auto; }
.skip-quick:hover { color: #f87171; border-color: rgba(248,113,113,.4); }
.skip-quick svg { width: 13px; height: 13px; }
.jobcard:hover .jc-right { opacity: 0; }
.jc-right { transition: opacity .12s; }

/* ---- PADDED CARD mode ---- */
.list-scroll.cards .jobcard { padding: 11px 12px 11px 14px; margin-bottom: 5px; border: 1px solid var(--line-soft); background: var(--glass); }
.list-scroll.cards .jobcard::before { top: 12px; bottom: 12px; }
.list-scroll.cards .jobcard:hover { background: var(--bg-hover); border-color: var(--line); }
.list-scroll.cards .jobcard.sel { background: var(--bg-active); border-color: var(--line-hi); }
.list-scroll.cards .logo { width: 38px; height: 38px; flex-basis: 38px; }
.list-scroll.cards .jc-tags { display: flex; align-items: center; gap: 6px; margin-top: 5px; }
.jc-tags { display: none; }

/* keyboard caret on selected */
.kbd-hint-row {
  display: flex; align-items: center; gap: 11px; padding: 6px 14px; font-size: 11px; color: var(--tx-faint);
  border-top: 1px solid var(--line-soft); background: rgba(10,11,16,.3); overflow: hidden;
}
.kbd-hint-row .grp { display: inline-flex; align-items: center; gap: 4px; }

/* ============================================================
   DETAIL PANEL
   ============================================================ */
.detail-pane { flex: 1; min-width: 0; display: flex; flex-direction: column; overflow: hidden; }
.detail-scroll { flex: 1; overflow-y: auto; overflow-x: hidden; }
.detail-head {
  padding: 22px 26px 16px; border-bottom: 1px solid var(--line);
  background: linear-gradient(180deg, rgba(124,58,237,.05), transparent);
  position: relative;
}
.dh-top { display: flex; align-items: flex-start; gap: 14px; }
.dh-logo { width: 50px; height: 50px; flex: 0 0 50px; border-radius: 13px; display: grid; place-items: center; font-family: var(--f-display); font-weight: 700; font-size: 19px; color: #fff; box-shadow: inset 0 1px 0 rgba(255,255,255,.18), var(--sh-2); }
.dh-info { flex: 1; min-width: 0; }
.dh-title { font-family: var(--f-display); font-size: 22px; font-weight: 700; letter-spacing: -.02em; line-height: 1.15; }
.dh-co { display: flex; align-items: center; gap: 9px; margin-top: 5px; font-size: 13px; color: var(--tx-2); flex-wrap: wrap; }
.dh-co .co-name { font-weight: 600; color: var(--tx); }
.dh-co .meta-i { display: inline-flex; align-items: center; gap: 4px; color: var(--tx-3); }
.dh-co .meta-i svg { width: 13px; height: 13px; }

.dh-score { flex: 0 0 auto; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.score-ring { position: relative; width: 64px; height: 64px; }
.score-ring svg { transform: rotate(-90deg); }
.score-ring .ring-bg { stroke: var(--bg-active); }
.score-ring .ring-fg { stroke: url(#ringGrad); stroke-linecap: round; transition: stroke-dashoffset 1.1s var(--ease); filter: drop-shadow(0 0 4px rgba(124,58,237,.5)); }
.score-ring .ring-val { position: absolute; inset: 0; display: grid; place-items: center; font-family: var(--f-mono); font-weight: 700; font-size: 16px; }
.score-ring .ring-val small { font-size: 9px; color: var(--tx-3); font-weight: 500; }
.dh-score .ring-label { font-size: 10px; color: var(--tx-3); text-transform: uppercase; letter-spacing: .06em; }

.actions { display: flex; align-items: center; gap: 8px; margin-top: 18px; flex-wrap: wrap; }
.act {
  display: inline-flex; align-items: center; gap: 7px; height: 34px; padding: 0 13px; border-radius: 8px;
  font-size: 12.5px; font-weight: 600; color: var(--tx); background: var(--bg-elevated); border: 1px solid var(--line-hi);
  transition: all .14s var(--ease);
}
.act svg { width: 14px; height: 14px; }
.act:hover { background: var(--bg-hover); border-color: var(--line-hi); transform: translateY(-1px); }
.act.primary { background: var(--grad); border-color: transparent; box-shadow: 0 5px 16px -6px var(--violet-glow), inset 0 1px 0 rgba(255,255,255,.2); }
.act.primary:hover { filter: brightness(1.08); }
.act.ai { color: #67e8f9; border-color: rgba(34,211,238,.3); background: rgba(34,211,238,.07); }
.act.ai:hover { background: rgba(34,211,238,.13); }
.act.ghost { background: transparent; color: var(--tx-3); }
.act.ghost:hover { color: var(--tx-2); }

/* tabs */
.tabs { display: flex; gap: 2px; padding: 0 26px; border-bottom: 1px solid var(--line); background: rgba(10,11,16,.3); }
.tab {
  position: relative; padding: 11px 13px; font-size: 12.5px; font-weight: 500; color: var(--tx-3);
  transition: color .14s; display: inline-flex; align-items: center; gap: 6px;
}
.tab:hover { color: var(--tx-2); }
.tab.on { color: var(--tx); }
.tab.on::after { content: ""; position: absolute; left: 11px; right: 11px; bottom: -1px; height: 2px; background: var(--grad); border-radius: 2px; }
.tab .tcount { font-family: var(--f-mono); font-size: 10px; color: var(--tx-3); background: var(--bg-elevated); border-radius: 8px; padding: 0 5px; }

.tab-body { padding: 22px 26px 40px; max-width: 760px; }

/* description markdown */
.md h3 { font-family: var(--f-display); font-size: 14px; font-weight: 600; margin: 22px 0 8px; color: var(--tx); letter-spacing: -.01em; }
.md h3:first-child { margin-top: 0; }
.md p { color: var(--tx-2); font-size: 13.5px; line-height: 1.62; margin-bottom: 12px; }
.md ul { margin: 0 0 14px; padding-left: 4px; list-style: none; display: flex; flex-direction: column; gap: 7px; }
.md li { color: var(--tx-2); font-size: 13.5px; line-height: 1.55; padding-left: 20px; position: relative; }
.md li::before { content: ""; position: absolute; left: 4px; top: 8px; width: 5px; height: 5px; border-radius: 2px; background: var(--grad); }
.md strong { color: var(--tx); font-weight: 600; }
.md .tag-row { display: flex; flex-wrap: wrap; gap: 6px; margin: 4px 0 16px; }
.md .tag { font-size: 11.5px; color: var(--tx-2); background: var(--bg-elevated); border: 1px solid var(--line); padding: 3px 9px; border-radius: 20px; }

/* qualify breakdown */
.qualify-head { display: flex; align-items: center; gap: 16px; padding: 16px; border-radius: var(--r-lg); background: var(--grad-soft); border: 1px solid rgba(124,58,237,.2); margin-bottom: 20px; }

/* qualify hero — big score */
.qual-hero { display: flex; gap: 20px; align-items: center; padding: 20px; border-radius: var(--r-lg); background: var(--grad-soft); border: 1px solid rgba(124,58,237,.2); margin-bottom: 22px; }
.qual-score { display: flex; flex-direction: column; align-items: center; gap: 9px; flex: 0 0 auto; padding-right: 20px; border-right: 1px solid var(--line); }
.qual-num { font-family: var(--f-mono); font-size: 44px; font-weight: 700; line-height: 1; letter-spacing: -.03em; background: var(--grad); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
.qual-num small { font-size: 14px; color: var(--tx-3); -webkit-text-fill-color: var(--tx-3); font-weight: 500; }
.qual-flag { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; }
.qual-flag svg { width: 12px; height: 12px; }
.qual-flag.yes { color: #6ee7b7; background: rgba(16,185,129,.13); border: 1px solid rgba(16,185,129,.3); }
.qual-flag.no { color: #fca5a5; background: rgba(248,113,113,.12); border: 1px solid rgba(248,113,113,.3); }
.qual-meta { min-width: 0; }
.qual-verdict { font-family: var(--f-display); font-size: 18px; font-weight: 700; letter-spacing: -.01em; }
.qual-summary { font-size: 13px; color: var(--tx-2); line-height: 1.6; margin-top: 7px; }
.crit-list-label { font-size: 10.5px; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; color: var(--tx-faint); margin-bottom: 4px; }

/* tips block */
.tips-block { margin-top: 26px; padding-top: 22px; border-top: 1px solid var(--line); }
.tips-head { display: flex; align-items: center; gap: 8px; font-family: var(--f-display); font-size: 14px; font-weight: 600; margin-bottom: 14px; }
.tips-head svg { width: 16px; height: 16px; color: var(--cyan); }
.tips-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
.tips-list li { display: flex; gap: 11px; align-items: flex-start; font-size: 13px; line-height: 1.55; color: var(--tx-2); }
.tip-num { flex: 0 0 20px; width: 20px; height: 20px; border-radius: 6px; display: grid; place-items: center; font-family: var(--f-mono); font-size: 11px; font-weight: 600; color: #c4b5fd; background: rgba(124,58,237,.14); border: 1px solid rgba(124,58,237,.3); margin-top: 1px; }

/* cover letter */
.cover-card { padding: 22px 24px; border-radius: var(--r-lg); background: var(--bg-base-2); border: 1px solid var(--line); }
.cover-text p { font-size: 13.5px; line-height: 1.7; }
.cover-text p:last-child { margin-bottom: 0; }
.qualify-verdict { font-family: var(--f-display); font-size: 18px; font-weight: 700; }
.qualify-verdict.pass { color: #6ee7b7; }
.crit { display: flex; align-items: flex-start; gap: 11px; padding: 12px 4px; border-bottom: 1px solid var(--line-soft); }
.crit:last-child { border: none; }
.crit-ico { width: 20px; height: 20px; flex: 0 0 20px; border-radius: 6px; display: grid; place-items: center; margin-top: 1px; }
.crit-ico.pass { background: rgba(16,185,129,.15); color: #34d399; }
.crit-ico.fail { background: rgba(248,113,113,.13); color: #f87171; }
.crit-ico.partial { background: rgba(245,158,11,.13); color: var(--amber); }
.crit-ico svg { width: 12px; height: 12px; }
.crit-main { flex: 1; }
.crit-name { font-size: 13px; font-weight: 600; color: var(--tx); }
.crit-detail { font-size: 12px; color: var(--tx-3); margin-top: 2px; line-height: 1.5; }
.crit-weight { font-family: var(--f-mono); font-size: 11px; color: var(--tx-3); }

/* tailor bullets */
.tailor-note { display: flex; gap: 9px; align-items: flex-start; padding: 11px 13px; border-radius: var(--r); background: rgba(34,211,238,.06); border: 1px solid rgba(34,211,238,.2); margin-bottom: 18px; font-size: 12.5px; color: var(--tx-2); line-height: 1.5; }
.tailor-note svg { width: 15px; height: 15px; color: var(--cyan); flex: 0 0 15px; margin-top: 1px; }
.bullet-card { display: flex; gap: 11px; padding: 13px; border-radius: var(--r); border: 1px solid var(--line); background: var(--glass); margin-bottom: 9px; transition: border-color .15s; }
.bullet-card:hover { border-color: var(--line-hi); }
.bullet-num { font-family: var(--f-mono); font-size: 11px; color: var(--violet); flex: 0 0 auto; padding-top: 2px; }
.bullet-text { flex: 1; font-size: 13px; line-height: 1.55; color: var(--tx); }
.bullet-text .hl { color: var(--cyan); font-weight: 600; }
.bullet-copy { color: var(--tx-3); padding: 3px; border-radius: 5px; flex: 0 0 auto; }
.bullet-copy:hover { color: var(--tx); background: var(--bg-hover); }
.bullet-copy svg { width: 14px; height: 14px; display: block; }

/* notes */
.notes-area {
  width: 100%; min-height: 220px; resize: vertical; padding: 14px; border-radius: var(--r-lg);

.splash.ready .lock-ring { animation: lock 1.3s var(--ease) 1.5s; }
.splash.ready .lock-ring-2 { animation-delay: 1.8s; }
@keyframes lock { 0% { opacity: .85; transform: scale(.45); } 100% { opacity: 0; transform: scale(1.35); } }

/* wordmark */
.splash-word { text-align: center; margin-top: 30px; }
.splash-brand {
  font-family: var(--f-display); font-size: 36px; font-weight: 800; letter-spacing: -.03em; color: #fff;
  opacity: 0; transform: translateY(14px);
  transition: opacity .7s var(--ease) .75s, transform .7s var(--ease) .75s;
}
.splash-brand .dot { color: #22d3ee; }
.splash-brand .hl { color: #4f8bff; }
.splash-tagline {
  font-size: 13px; font-weight: 600; letter-spacing: .26em; text-transform: uppercase; color: #6b7a96;
  margin-top: 11px;
  opacity: 0; transform: translateY(12px);
  transition: opacity .7s var(--ease) .98s, transform .7s var(--ease) .98s;
}
.splash.ready .splash-brand { opacity: 1; transform: none; }
.splash.ready .splash-tagline { opacity: 1; transform: none; }

/* progress */
.splash-progress { width: 190px; height: 3px; border-radius: 3px; background: rgba(255,255,255,.08); margin-top: 30px; overflow: hidden; }
.splash-progress i { display: block; height: 100%; width: 0; border-radius: 3px; background: linear-gradient(90deg, #2563eb, #22d3ee); box-shadow: 0 0 12px rgba(37,99,235,.6); transition: width 2.7s var(--ease) .3s; }
.splash.ready .splash-progress i { width: 100%; }

/* skip hint */
.splash-skip {
  position: absolute; bottom: 30px; left: 0; right: 0; text-align: center;
  font-size: 11.5px; letter-spacing: .04em; color: var(--tx-faint);
  opacity: 0; transition: opacity .6s var(--ease) 1.6s;
}
.splash.ready .splash-skip { opacity: 1; }

/* ============================================================
   LOGIN ENHANCEMENTS — forgot password + features list
   ============================================================ */
.auth-pass-row { display: flex; align-items: center; justify-content: space-between; }
.auth-forgot { font-size: 11.5px; font-weight: 500; color: var(--cyan); cursor: pointer; }
.auth-forgot:hover { text-decoration: underline; }

.auth-features { list-style: none; display: flex; flex-direction: column; gap: 13px; margin-top: 28px; }
.auth-features li { display: flex; align-items: center; gap: 11px; font-size: 13.5px; color: var(--tx-2); }
.auth-features li svg { width: 16px; height: 16px; flex: 0 0 16px; color: var(--cyan); }
.auth-feat-ico {
  width: 30px; height: 30px; flex: 0 0 30px; border-radius: 9px; display: grid; place-items: center;
  background: rgba(37,99,235,.14); border: 1px solid rgba(37,99,235,.28);
}
.auth-feat-ico svg { width: 15px; height: 15px; color: #60a5fa; }

/* forgot-password / reset view */
.auth-reset { animation: onbIn .25s var(--ease); }
.auth-back { display: inline-flex; align-items: center; gap: 6px; font-size: 12.5px; font-weight: 500; color: var(--tx-3); margin-bottom: 18px; transition: color .14s; }
.auth-back:hover { color: var(--tx); }
.auth-reset-title { font-family: var(--f-display); font-size: 22px; font-weight: 700; letter-spacing: -.02em; }
.auth-reset-sub { font-size: 13.5px; color: var(--tx-2); line-height: 1.6; margin: 8px 0 22px; }
.auth-reset-sub b { color: var(--tx); font-weight: 600; }
.auth-reset .auth-submit { width: 100%; margin-top: 4px; }
.auth-reset .auth-foot { margin-top: 18px; }
.reset-ico {
  width: 52px; height: 52px; border-radius: 15px; display: grid; place-items: center; margin-bottom: 18px;
  color: #34d399; background: rgba(16,185,129,.13); border: 1px solid rgba(16,185,129,.3);
}
.reset-ico svg { width: 24px; height: 24px; }
[data-theme="light"] .reset-ico { color: #047857; }

@media (prefers-reduced-motion: reduce) {
  .splash-glow, .particle, .scanner, .lock-ring { animation: none !important; }
}
