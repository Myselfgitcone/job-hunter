[phases.setup]
nixPkgs = ["python311", "curl"]

[phases.install]
cmds = [
  "curl -sSL https://bootstrap.pypa.io/get-pip.py | python3 - --break-system-packages",
  "python3 -m pip install --break-system-packages -r backend/requirements.txt"
]

[start]
cmd = "cd backend && python3 -m uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000}"
