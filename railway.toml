[build]
builder = "nixpacks"

[build.env]
NIXPACKS_INSTALL_CMD = "cd backend && pip install -r requirements.txt"
NIXPACKS_BUILD_CMD = ""
NIXPACKS_START_CMD = "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"

[deploy]
startCommand = "cd backend && python3 -m uvicorn main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/api/settings"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
